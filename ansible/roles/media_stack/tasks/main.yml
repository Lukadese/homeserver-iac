---
- name: Build the appdata and media directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0775'
  loop:
    - "{{ appdata_dir }}"
    - "{{ storage_merged }}/data/torrents/tv"
    - "{{ storage_merged }}/data/torrents/movies"
    - "{{ storage_merged }}/data/media/tv"
    - "{{ storage_merged }}/data/media/movies"

- name: Generate the internal .env file for Docker
  ansible.builtin.template:
    src: env.j2
    dest: "{{ appdata_dir }}/.env"
    mode: '0600'

- name: Generate the Gluetun VPN environment file
  ansible.builtin.template:
    src: gluetun.env.j2
    dest: "{{ appdata_dir }}/gluetun.env"
    mode: '0600'

- name: Copy the Docker Compose file to the server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/docker-compose.yml"
    dest: "{{ appdata_dir }}/docker-compose.yml"
    mode: '0644'

- name: Copy the hardware-acceleration overlay to the server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/hwaccel.yml"
    dest: "{{ appdata_dir }}/hwaccel.yml"
    mode: '0644'

- name: Bring up the full media stack
  community.docker.docker_compose_v2:
    project_src: "{{ appdata_dir }}"
    # The hwaccel overlay maps /dev/dri and is only applied when the machine
    # actually has an Intel iGPU (hw_transcoding)
    files: "{{ ['docker-compose.yml', 'hwaccel.yml'] if hw_transcoding | bool else ['docker-compose.yml'] }}"
    state: present
    pull: always
