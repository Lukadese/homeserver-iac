services:
  # Network & Security
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASS}
      # Allow traffic to the local network, otherwise the WebUIs are unreachable from your LAN
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET}
    ports:
      - 8080:8080 # qBittorrent
      - 8000:8000 # Dispatcharr
    restart: unless-stopped

  # Lightweight monitoring
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes: [/var/run/docker.sock:/var/run/docker.sock:ro]
    ports: ["8888:8080"]
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes: 
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_DIR}/portainer:/data
    ports: ["9443:9443"]
    restart: unless-stopped

  # Downloaders & IPTV routed through the VPN
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA_DIR}/qbittorrent:/config
      - ${STORAGE_DIR}/data:/data
    restart: unless-stopped

  dispatcharr:
    image: dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/dispatcharr:/config
    restart: unless-stopped

  # Media & automation
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports: ["8096:8096"]
    volumes:
      - ${APPDATA_DIR}/jellyfin:/config
      - ${STORAGE_DIR}/data/media:/data/media
    devices:
      - /dev/dri:/dev/dri # Intel QuickSync
    # Required so the PUID user can access /dev/dri (otherwise transcoding falls back to the CPU)
    group_add:
      - "render"
      - "video"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports: ["7878:7878"]
    volumes:
      - ${APPDATA_DIR}/radarr:/config
      - ${STORAGE_DIR}/data:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports: ["8989:8989"]
    volumes:
      - ${APPDATA_DIR}/sonarr:/config
      - ${STORAGE_DIR}/data:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports: ["9696:9696"]
    volumes:
      - ${APPDATA_DIR}/prowlarr:/config
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports: ["6767:6767"]
    volumes:
      - ${APPDATA_DIR}/bazarr:/config
      - ${STORAGE_DIR}/data/media:/data/media
    restart: unless-stopped

  seerr:
    image: fallenbagel/jellyseerr:latest
    container_name: seerr
    environment:
      - TZ=${TZ}
    ports: ["5055:5055"]
    volumes:
      - ${APPDATA_DIR}/seerr:/app/config
    restart: unless-stopped