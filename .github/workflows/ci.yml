name: IaC Pipeline
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Docker Compose Syntax
        run: docker compose -f compose/docker-compose.yml config -q
      - name: Install Ansible Lint
        run: pip install ansible-lint
      - name: Install vereiste Ansible Collections
        run: ansible-galaxy collection install ansible.posix community.docker
      - name: Lint Playbooks
        run: ansible-lint ansible/site.yml
